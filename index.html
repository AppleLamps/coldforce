<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>COLDFORCE</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme = stored || (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to posts</a>
    <div class="scanlines" aria-hidden="true"></div>
    <div class="wrap">
      <header class="hero" aria-label="Profile">
        <div class="hero-grid" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
        <p class="eyebrow">Bluesky posts</p>
        <div class="identity">
          <div class="avatar" aria-hidden="true">cf</div>
          <div class="identity-text">
            <h1 class="title">COLDFORCE</h1>
            <p class="meta-line" id="sourceMeta"></p>
          </div>
        </div>
        <p class="hero-copy">Search and browse the latest saved posts from Coldforce.</p>
      </header>

      <div class="sticky-bar" data-stuck="false" id="stickyBar" role="search">
        <div class="sticky-inner">
          <label class="search-field">
            <span class="visually-hidden">Search posts</span>
            <span class="search-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7" />
                <line x1="20" y1="20" x2="16.65" y2="16.65" />
              </svg>
            </span>
            <input
              type="search"
              id="search"
              class="search"
              placeholder="Search posts…"
              autocomplete="off"
              inputmode="search"
              enterkeyhint="search"
            />
            <button type="button" class="search-clear" id="searchClear" hidden aria-label="Clear search" title="Clear (Esc)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
              </svg>
            </button>
          </label>
          <div class="toolbar">
            <label class="sort-label">
              <span class="visually-hidden">Sort</span>
              <select class="sort" id="sort" aria-label="Sort order">
                <option value="newest" selected>Newest first</option>
                <option value="oldest">Oldest first</option>
              </select>
            </label>
            <button type="button" id="themeToggle" class="theme-toggle" aria-label="Switch to light mode" aria-pressed="false" title="Toggle theme">
              <svg class="theme-icon theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
              <svg class="theme-icon theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="4" />
                <line x1="12" y1="2" x2="12" y2="5" />
                <line x1="12" y1="19" x2="12" y2="22" />
                <line x1="2" y1="12" x2="5" y2="12" />
                <line x1="19" y1="12" x2="22" y2="12" />
                <line x1="4.5" y1="4.5" x2="6.5" y2="6.5" />
                <line x1="17.5" y1="17.5" x2="19.5" y2="19.5" />
                <line x1="4.5" y1="19.5" x2="6.5" y2="17.5" />
                <line x1="17.5" y1="6.5" x2="19.5" y2="4.5" />
              </svg>
            </button>
            <p class="count" id="count" role="status" aria-live="polite"></p>
          </div>
        </div>
        <p class="kbd-hint" aria-hidden="true"><kbd>/</kbd> focus search</p>
      </div>

      <main id="main" tabindex="-1">
        <div class="status-block" id="statusBlock" aria-live="polite" aria-busy="true">
          <div class="skeleton-list" id="skeleton" aria-hidden="true">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
          </div>
          <p class="status" id="status">Loading posts…</p>
        </div>
        <p class="empty" id="empty" hidden role="status">No posts match your search.</p>
        <ul class="posts" id="posts" hidden></ul>
      </main>
    </div>

    <button type="button" class="to-top" id="toTop" hidden aria-label="Back to top" title="Back to top">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="18 15 12 9 6 15" />
      </svg>
    </button>
    <script src="app.js" defer></script>
  </body>
</html>
